#
#     Program       :   Bot de WhatsApp con Google Sheets,
#                          para Asignación de Turnos en Rouss Coiffeur's de MEMORY   Ingeniería en Sistemas.-
#
#    "File Purpose:     Archivo de Configuración para Despliegue en Render.com.-
#                       Define dos Servicios: Web ( Servidor Flask con Gunicorn/Uvicorn para Recibir
#                       Webhooks de WhatsApp ) y Worker ( Proceso en Background para Tareas Programadas
#                       y Procesamiento de Reservas ). Ambos Servicios Usan Docker y Plan Gratuito.-
#
#
# *********************************************************************************************************************

services:
  - type: web
    name: rouss-bot-web
    env: docker
    plan: free
    repo: https://github.com/AADiSanto/Rouss_Bot_Goggle_Sheets_Whatsapp
    branch: main
    startCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT'

  - type: worker
    name: rouss-bot-worker
    env: docker
    plan: free
    repo: https://github.com/AADiSanto/Rouss_Bot_Goggle_Sheets_Whatsapp
    branch: main
    startCommand: 'python worker.py'


